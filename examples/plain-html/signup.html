<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080a0f">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2346e3b7'/%3E%3Cpath d='M8 8h9a7 7 0 0 1 0 14h-3v-5h3a2 2 0 1 0 0-4H8z' fill='%23080a0f'/%3E%3C/svg%3E">
    <title>Calibrate onboarding flow</title>
    <style>
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; color: #f7f7f8; background: #080a0f; font: 16px system-ui, sans-serif; }
      main { width: min(28rem, calc(100% - 2rem)); padding: 2rem; border: 1px solid #29303b; border-radius: 1rem; background: #11151d; }
      h1 { margin-top: 0; }
      [hidden] { display: none; }
      label { display: block; margin: 1rem 0 .4rem; color: #b5bdc9; }
      input, select, button, .button { width: 100%; padding: .85rem; border: 1px solid #3a4352; border-radius: .5rem; color: inherit; background: #0b0e14; font: inherit; }
      button { margin-top: 1rem; border-color: #46e3b7; color: #07110e; background: #46e3b7; font-weight: 700; cursor: pointer; }
      button.secondary { color: #f7f7f8; background: transparent; }
      button:focus-visible, input:focus-visible, select:focus-visible, .button:focus-visible { outline: 3px solid #fbbf24; outline-offset: 3px; }
      small, .progress, #tracking-status { color: #aeb7c5; }
      .progress { margin: 0 0 .75rem; font-size: .875rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
      .button { display: block; margin-top: 1rem; border-color: #46e3b7; color: #07110e; background: #46e3b7; font-weight: 700; text-align: center; text-decoration: none; }
      #tracking-status { margin: 1.5rem 0 0; font-size: .8rem; text-align: center; }
    </style>
  </head>
  <body>
    <main>
      <section id="account" aria-labelledby="account-title">
        <p class="progress">Step 1 of 3</p>
        <h1 id="account-title" tabindex="-1">Create your account</h1>
        <small>Calibrate records the step name, never the email you enter.</small>
        <form id="account-form">
          <label for="email-input">Email</label>
          <input id="email-input" type="email" required autocomplete="email">
          <button>Choose a plan</button>
        </form>
      </section>
      <section id="workspace" aria-labelledby="workspace-title" hidden>
        <p class="progress">Step 2 of 3</p>
        <h1 id="workspace-title" tabindex="-1">Set up your workspace</h1>
        <form id="workspace-form">
          <label for="workspace-input">Workspace name</label>
          <input id="workspace-input" required autocomplete="organization">
          <label for="plan-input">Plan</label>
          <select id="plan-input"><option>Starter</option><option>Team</option></select>
          <button>Create workspace</button>
          <button class="secondary" id="back-button" type="button">Back to account</button>
        </form>
      </section>
      <section id="complete" aria-labelledby="complete-title" hidden>
        <p class="progress">Step 3 of 3</p>
        <h1 id="complete-title" tabindex="-1">Workspace ready</h1>
        <p>Onboarding complete. Open the dashboard to confirm the session arrived.</p>
        <a class="button" href="http://localhost:8787/dashboard#token=example-dashboard" target="_blank" rel="noreferrer">View onboarding data</a>
      </section>
      <p id="tracking-status" role="status">Connecting to Calibrate...</p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/usecalibrate@0.1.4/dist/tracker.min.js"></script>
    <script>
      // calibrate integration starts
      const manifest = {
        version: "onboarding-demo-v1",
        groups: ["account", "workspace", "activation"],
        steps: [
          { id: "account", group: "account" },
          { id: "workspace", group: "workspace" },
          { id: "complete", group: "activation" }
        ]
      };
      calibrate.init({
        endpoint: "http://localhost:8787",
        writeKey: "example-write-key",
        manifest,
        app: "onboarding-demo",
        debug: true
      }).then(() => {
        calibrate.view("account");
        document.body.dataset.calibrateReady = "true";
        document.querySelector("#tracking-status").textContent = "Calibrate tracking active";
      });
      const show = id => {
        document.querySelectorAll("main section").forEach(section => {
          section.hidden = section.id !== id;
        });
        document.querySelector(`#${id} h1`).focus();
      };
      document.querySelector("#account-form").addEventListener("submit", event => {
        event.preventDefault();
        calibrate.complete("account");
        calibrate.view("workspace", "forward", "account");
        show("workspace");
      });
      document.querySelector("#back-button").addEventListener("click", () => {
        calibrate.view("account", "back", "workspace");
        show("account");
      });
      document.querySelector("#workspace-form").addEventListener("submit", event => {
        event.preventDefault();
        calibrate.complete("workspace");
        calibrate.view("complete", "forward", "workspace");
        calibrate.complete("complete");
        calibrate.shipped();
        show("complete");
      });
      // calibrate integration ends
    </script>
  </body>
</html>
